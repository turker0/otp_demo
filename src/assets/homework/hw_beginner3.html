<body class="antialiased min-h-screen relative pb-safe">
<!-- Main Content Canvas -->

<!-- Header Section -->
<section class="flex flex-col gap-unit">
<h2 class="font-display text-display text-on-surface">My Tasks</h2>

<!-- Task List (Card-based Layout) -->
<section class="flex flex-col gap-md">
<!-- Task Item -->
<article class="bg-surface-container-lowest border border-outline-variant rounded-xl p-md flex items-center gap-md shadow-sm">
<div class="w-6 h-6 rounded-md border border-outline flex flex-shrink-0 items-center justify-center cursor-pointer hover:border-primary transition-colors">
<!-- Unchecked -->
</div>
<div class="flex flex-col flex-1">
<h3 class="font-body-lg text-body-lg text-on-surface">Complete UI Design Review</h3>
</div>
</article>
<!-- Task Item -->
<article class="bg-surface-container-lowest border border-outline-variant rounded-xl p-md flex items-center gap-md shadow-sm">
<div class="w-6 h-6 rounded-md border border-outline flex flex-shrink-0 items-center justify-center cursor-pointer hover:border-primary transition-colors">
</div>
<div class="flex flex-col flex-1">
<h3 class="font-body-lg text-body-lg text-on-surface">Reply to client emails</h3>
</div>
</article>
<!-- Task Item: Completed -->
<article class="bg-surface border border-outline-variant rounded-xl p-md flex items-center gap-md opacity-60">
<div class="w-6 h-6 rounded-md bg-primary text-on-primary flex flex-shrink-0 items-center justify-center cursor-pointer">

<div class="flex flex-col flex-1">
