<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" name="viewport"/>
<title>Spotify Music Player</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "tertiary-fixed-dim": "#e5b4ff",
                        "surface": "#f7f9ff",
                        "secondary-container": "#fc8b2f",
                        "on-error-container": "#93000a",
                        "outline-variant": "#bfc7d3",
                        "surface-tint": "#00629d",
                        "on-secondary": "#ffffff",
                        "on-surface-variant": "#3f4851",
                        "on-tertiary-fixed": "#30004b",
                        "on-surface": "#171c21",
                        "tertiary-container": "#c173f0",
                        "primary-fixed": "#cfe5ff",
                        "on-background": "#171c21",
                        "on-secondary-fixed-variant": "#723600",
                        "on-error": "#ffffff",
                        "primary": "#00629d",
                        "inverse-surface": "#2c3136",
                        "on-tertiary-container": "#4a0071",
                        "on-tertiary": "#ffffff",
                        "surface-container-highest": "#dee3ea",
                        "secondary-fixed": "#ffdcc6",
                        "on-secondary-container": "#642f00",
                        "surface-bright": "#f7f9ff",
                        "on-primary-container": "#003050",
                        "on-primary-fixed-variant": "#004a78",
                        "surface-variant": "#dee3ea",
                        "surface-container-high": "#e4e8f0",
                        "primary-fixed-dim": "#99cbff",
                        "secondary-fixed-dim": "#ffb786",
                        "secondary": "#964900",
                        "primary-container": "#1d9bf0",
                        "outline": "#6f7883",
                        "error": "#ba1a1a",
                        "tertiary-fixed": "#f5d9ff",
                        "background": "#f7f9ff",
                        "on-primary-fixed": "#001d33",
                        "inverse-on-surface": "#edf1f8",
                        "tertiary": "#8639b4",
                        "on-tertiary-fixed-variant": "#6c1a9a",
                        "surface-dim": "#d6dae1",
                        "surface-container": "#eaeef5",
                        "on-primary": "#ffffff",
                        "error-container": "#ffdad6",
                        "inverse-primary": "#99cbff",
                        "surface-container-low": "#f0f4fb",
                        "on-secondary-fixed": "#311300",
                        "surface-container-lowest": "#ffffff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "margin-mobile": "16px",
                        "lg": "16px",
                        "gutter": "12px",
                        "md": "12px",
                        "unit": "4px",
                        "xs": "4px",
                        "xxl": "32px",
                        "sm": "8px",
                        "xl": "24px"
                    },
                    "fontFamily": {
                        "display": ["Plus Jakarta Sans"],
                        "body-md": ["Plus Jakarta Sans"],
                        "label-sm": ["Plus Jakarta Sans"],
                        "label-md": ["Plus Jakarta Sans"],
                        "body-lg": ["Plus Jakarta Sans"],
                        "h3": ["Plus Jakarta Sans"],
                        "h2": ["Plus Jakarta Sans"],
                        "body-sm": ["Plus Jakarta Sans"],
                        "h1": ["Plus Jakarta Sans"]
                    },
                    "fontSize": {
                        "display": ["30px", { "lineHeight": "36px", "letterSpacing": "-0.02em", "fontWeight": "800" }],
                        "body-md": ["15px", { "lineHeight": "20px", "letterSpacing": "0em", "fontWeight": "400" }],
                        "label-sm": ["12px", { "lineHeight": "14px", "letterSpacing": "0.03em", "fontWeight": "600" }],
                        "label-md": ["14px", { "lineHeight": "16px", "letterSpacing": "0.02em", "fontWeight": "600" }],
                        "body-lg": ["16px", { "lineHeight": "24px", "letterSpacing": "0em", "fontWeight": "400" }],
                        "h3": ["17px", { "lineHeight": "22px", "letterSpacing": "0em", "fontWeight": "700" }],
                        "h2": ["20px", { "lineHeight": "24px", "letterSpacing": "-0.01em", "fontWeight": "700" }],
                        "body-sm": ["13px", { "lineHeight": "18px", "letterSpacing": "0.01em", "fontWeight": "400" }],
                        "h1": ["23px", { "lineHeight": "28px", "letterSpacing": "-0.01em", "fontWeight": "800" }]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
        .pt-safe { padding-top: env(safe-area-inset-top); }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface antialiased h-screen w-screen overflow-hidden flex flex-col relative font-body-md text-body-md">
<!-- Top App Bar - Overlaid on Album Art -->
<header class="fixed top-0 left-0 w-full flex justify-between items-center px-4 h-14 z-50 pt-safe">
<button class="w-10 h-10 flex items-center justify-center rounded-full bg-black/20 backdrop-blur-md text-white hover:bg-black/30 transition-colors">
<span class="material-symbols-outlined text-2xl">keyboard_arrow_down</span>
</button>
<div class="flex flex-col items-center">
<span class="font-label-sm text-label-sm text-white/80 uppercase tracking-wider">Playing from playlist</span>
<span class="font-label-md text-label-md text-white font-bold">Late Night Drives</span>
</div>
<button class="w-10 h-10 flex items-center justify-center rounded-full bg-black/20 backdrop-blur-md text-white hover:bg-black/30 transition-colors">
<span class="material-symbols-outlined text-2xl">more_vert</span>
</button>
</header>
<!-- Full Screen Album Art Background with Gradient Overlay -->
<div class="absolute inset-0 z-0 bg-black">
<div class="w-full h-full bg-cover bg-center opacity-60" data-alt="Abstract neon geometric shapes in deep blues and purples, evoking a futuristic late night synthwave music album cover" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuDeru_FHcwZTgB7xJchI-Uv1-dgbMXOPqSfvctuTxapnSepFcSOfpGUEyARjqXjK3z4TTxYg6R5JuZXzKnvrBSnOU6CIlxeaP_O0FEY12B_xIAERoVPwaIBq8HuX7BHqe2ACSfW5J6o-mAIf9K5R8f3HLTr0pBEIvwGYwUENV7QgL_X1Icqq928F0XiF6oMRgMyNjII-nIkczIfkv3NT1G2MUt9bflq3XUTTKsAqTcACDGCEjd71B5LCq5Kg9LyrJJfJ2k4ZMgFd5A');">
</div>
<div class="absolute inset-0 bg-gradient-to-b from-transparent via-black/40 to-black/90"></div>
</div>
<!-- Main Content Area -->
<main class="flex-1 flex flex-col justify-end px-6 pb-8 z-10 w-full max-w-md mx-auto">
<!-- Album Art Card (for visual focal point even with full background) -->
<div class="w-full aspect-square rounded-xl overflow-hidden shadow-2xl mb-8 border border-white/10">
<img alt="Album Art" class="w-full h-full object-cover" data-alt="Abstract neon geometric shapes in deep blues and purples, evoking a futuristic late night synthwave music album cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBMOOHYA6QBS8TiS28YLIMp6zhKUXY4oczYh8-Uw2DxWPuhJiloc4cV_0aFle_9S20C8NDWsYVeMxY5cYexMDI28SsGlxWzOE7_RLkwxJGv6do5nE4IvIhWTSd1Jrsub8rigDMpzEYR3dnxKefRsPhUPee04osZoLcGjyEYcdOwSRyRzeT9qt8btad89pAmpj29J9JxNVvq-R8PlLAmvZ74OEIuPPePTLrixZI1rFdos9zXOb5hAobT-XsSm-UeoZpQ2kZLcgdj-M4"/>
</div>
<!-- Track Info & Like Button -->
<div class="flex items-center justify-between mb-6">
<div class="flex flex-col">
<h1 class="font-h1 text-h1 text-white mb-1 truncate pr-4">Midnight City Lights</h1>
<h2 class="font-body-lg text-body-lg text-white/70 truncate">Neon Vectors</h2>
</div>
<button class="w-10 h-10 flex items-center justify-center text-white hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1;">favorite</span>
</button>
</div>
<!-- Progress Bar -->
<div class="mb-6">
<div class="w-full h-1.5 bg-white/20 rounded-full relative overflow-hidden group cursor-pointer mb-2">
<div class="absolute top-0 left-0 h-full bg-white w-1/3 rounded-full relative">
<div class="absolute right-0 top-1/2 -translate-y-1/2 w-3 h-3 bg-white rounded-full opacity-0 group-hover:opacity-100 transition-opacity"></div>
</div>
</div>
<div class="flex justify-between items-center px-1">
<span class="font-label-sm text-label-sm text-white/70">1:24</span>
<span class="font-label-sm text-label-sm text-white/70">-2:41</span>
</div>
</div>
<!-- Media Controls -->
<div class="flex items-center justify-between mb-8">
<button class="w-12 h-12 flex items-center justify-center text-white/70 hover:text-white transition-colors">
<span class="material-symbols-outlined text-2xl">shuffle</span>
</button>
<button class="w-14 h-14 flex items-center justify-center text-white hover:text-white/80 transition-colors">
<span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 1;">skip_previous</span>
</button>
<button class="w-20 h-20 flex items-center justify-center bg-white rounded-full text-black hover:scale-105 transition-transform shadow-lg">
<span class="material-symbols-outlined text-5xl" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
</button>
<button class="w-14 h-14 flex items-center justify-center text-white hover:text-white/80 transition-colors">
<span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 1;">skip_next</span>
</button>
<button class="w-12 h-12 flex items-center justify-center text-white/70 hover:text-white transition-colors relative">
<span class="material-symbols-outlined text-2xl">repeat</span>
</button>
</div>
<!-- Bottom Actions (Lyrics, Devices, Share) -->
<div class="flex items-center justify-between text-white/70 px-2">
<button class="w-10 h-10 flex items-center justify-center hover:text-white transition-colors">
<span class="material-symbols-outlined text-xl">devices</span>
</button>
<button class="w-10 h-10 flex items-center justify-center hover:text-white transition-colors">
<span class="material-symbols-outlined text-xl">ios_share</span>
</button>
<button class="w-10 h-10 flex items-center justify-center hover:text-white transition-colors">
<span class="material-symbols-outlined text-xl">queue_music</span>
</button>
</div>
</main>
</body></html>
