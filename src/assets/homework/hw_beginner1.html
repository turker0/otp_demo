<body class="bg-surface-container-lowest min-h-screen flex flex-col items-center justify-center p-margin-mobile text-on-surface antialiased">
<main class="w-full max-w-sm flex flex-col space-y-xxl">
<header class="flex flex-col items-center text-center space-y-sm">
<h1 class="font-display text-display text-on-surface">Welcome back</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Please enter your details to sign in to your account.</p>
</header>
<form class="flex flex-col space-y-lg w-full">
<div class="flex flex-col space-y-xs">
<label class="font-label-md text-label-md text-on-surface" for="email">Email</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-md text-on-surface-variant" data-icon="mail">mail</span>
<input class="w-full h-[48px] pl-[40px] pr-md border border-outline-variant rounded-lg bg-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary font-body-md text-body-md text-on-surface placeholder:text-outline transition-colors" id="email" name="email" placeholder="Enter your email" required="" type="email"/>
</div>
</div>
<div class="flex flex-col space-y-xs">
<label class="font-label-md text-label-md text-on-surface" for="password">Password</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-md text-on-surface-variant" data-icon="lock">lock</span>
<input class="w-full h-[48px] pl-[40px] pr-md border border-outline-variant rounded-lg bg-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary font-body-md text-body-md text-on-surface placeholder:text-outline transition-colors" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<button class="w-full h-[48px] bg-primary text-on-primary font-label-md text-label-md rounded-full flex items-center justify-center mt-sm hover:bg-on-primary-fixed-variant transition-colors active:scale-[0.98]" type="submit">
                Login
            </button>
</form>
</main>
